services:
  weatherapiwrapper:
    build:
      context: .
      dockerfile: WeatherApiWrapper/Dockerfile
    container_name: weather-api-wrapper
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      WeatherApi__ApiKey: ${WEATHER_API_KEY}
      ConnectionStrings__Redis: redis:6379
    depends_on:
      - redis

  redis:
    image: redis:latest
    container_name: weather-redis-compose
    ports:
      - "6379:6379"